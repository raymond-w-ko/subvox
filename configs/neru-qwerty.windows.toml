# QWERTY translation of y3owk1n's public Neru config.
#
# Source reference in this repo:
# configs/neru-y3owk1n.toml
#
# Upstream source:
# https://github.com/y3owk1n/nix-system-config-v2/blob/main/modules/home/packages/neru.nix

[general]
hide_overlay_in_screen_share = true
passthrough_unbounded_keys = true
exec_shell = 'C:\Windows\System32\cmd.exe'
exec_shell_args = ["/c"]

[hotkeys]
"Ctrl+Y" = "recursive_grid --cursor-selection-mode hold"
"Ctrl+;" = ["action move_mouse --selection", "scroll"]

[hints]
enabled = false
visible_check_enabled = false

hint_characters = "adfhjkl;rtyuioxcvbnm,./"
include_menubar_hints = true
include_dock_hints = true
include_nc_hints = true
include_stage_manager_hints = true
include_pip_hints = true
include_screen_capture_hints = true
detect_mission_control = true
on_mission_control_activated = "hints --action left_click"
on_mission_control_deactivated = "idle"

clickable_roles = [
  "AXButton",
  "AXComboBox",
  "AXCheckBox",
  "AXRadioButton",
  "AXLink",
  "AXPopUpButton",
  "AXTextField",
  "AXSlider",
  "AXTabButton",
  "AXSwitch",
  "AXDisclosureTriangle",
  "AXTextArea",
  "AXMenuItem",
  "AXCell",
  "AXRow",
  "AXMenuButton",
  "AXGenericElement",
]

additional_menubar_hints_targets = [
  "com.apple.TextInputMenuAgent",
  "com.apple.controlcenter",
  "com.apple.systemuiserver",
  "com.y3owk1n.neru",
  "com.openai.codex",
  "com.google.antigravity",
]

[[hints.app_configs]]
bundle_id = "com.apple.Safari"
visible_check_enabled = true

[hints.additional_ax_support]
enable = true
additional_electron_bundles = [
  "com.openai.codex",
  "com.hnc.discord",
  "com.google.antigravity",
]
additional_chromium_bundles = []
additional_firefox_bundles = []
additional_webkit_bundles = []

[hints.boundary_highlight]
enabled = true

[grid]
enabled = false

[recursive_grid]
enabled = true
grid_cols = 5
grid_rows = 5
keys = "yuiopasdfghjkl;zxcvbnm,./"
min_size_width = 1
min_size_height = 1

[recursive_grid.animation]
enabled = false

[recursive_grid.ui]
font_family = "JetBrainsMonoNLNFP-Regular"
font_size = 12
line_width = 1
highlight_color = "#88000000"
text_color = "#FF00FF00"
label_background = false
label_background_color = "#99000000"
label_background_padding_x = 0
label_background_padding_y = 0
label_background_border_radius = 0
label_background_border_width = 0
sub_key_preview = true
sub_key_preview_font_size = 10
sub_key_preview_autohide_multiplier = 1.5
sub_key_preview_text_color = "#CC0088AA"

[recursive_grid.hotkeys]
# disable built-in defaults
"Shift+L" = "__disabled__"
"Shift+R" = "__disabled__"
"Shift+M" = "__disabled__"
"Shift+I" = "__disabled__"
"Shift+U" = "__disabled__"
"`" = "__disabled__"

"Tab" = "toggle-cursor-follow-selection"

"q" = "idle"
"w" = "action reset"
"e" = "action move_mouse"
"r" = "action mouse_down"
"t" = "action mouse_up"
"Enter" = "action left_click"
"Shift+Enter" = "action middle_click"
"Ctrl+Enter" = "action right_click"
"Space" = "action left_click"
"Shift+Space" = "action middle_click"
"Ctrl+Space" = "action right_click"

"Ctrl+C" = "idle"
"Ctrl+J" = "action scroll_down"
"Ctrl+K" = "action scroll_up"
"Ctrl+H" = "action scroll_left"
"Ctrl+L" = "action scroll_right"

[scroll]
scroll_step = 1

[scroll.hotkeys]
# disable built-in defaults
"Shift+L" = "__disabled__"
"Shift+R" = "__disabled__"
"Shift+M" = "__disabled__"
"Shift+I" = "__disabled__"
"Shift+U" = "__disabled__"

"Ctrl+C" = "idle"
"y" = "action feed ctrl+y"

"Enter" = "action left_click"
"Shift+Enter" = "action middle_click"
"Ctrl+Enter" = "action right_click"
"Space" = "action left_click"
"Shift+Space" = "action middle_click"
"Ctrl+Space" = "action right_click"

[mouse_action_indicator]
enabled = true

[mode_indicator.ui]
font_family = "JetBrainsMonoNLNFP-Bold"
